<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolling 10-Word Flashcards</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #1e2235;
            --card-back-bg: #131722;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --hard-btn: #ef4444;
            --easy-btn: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        h2 { text-align: center; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.025em;}
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 0; margin-bottom: 24px;}
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        input, select {
            background: #111524; color: var(--text-main); border: 1px solid #2e344e;
            padding: 12px; border-radius: 10px; font-size: 15px; outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        
        button.primary-btn {
            background: var(--accent); color: white; border: none; padding: 14px;
            font-weight: 600; border-radius: 12px; cursor: pointer; margin-top: 8px; font-size: 16px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .hidden { display: none !important; }
        
        /* Flashcard Layout */
        .card-container { perspective: 1000px; width: 100%; height: 340px; margin-top: 10px; }
        .card {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 24px; box-sizing: border-box; border-radius: 20px;
            background: var(--card-bg); border: 1px solid #2d3149; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .front { font-size: 26px; font-weight: 700; text-align: center; cursor: pointer;}
        .back { transform: rotateY(180deg); background: var(--card-back-bg); }
        .back-content { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 600; text-align: center; width: 100%; }
        
        .audio-btn {
            background: rgba(255, 255, 255, 0.07); border: none; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s; margin-bottom: 20px;
        }
        .audio-btn:active { background: var(--accent); }
        .audio-btn svg { width: 22px; height: 22px; fill: var(--text-main); }

        .extra-wrapper { width: 100%; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .extra-btn { background: #22253a; color: var(--text-muted); border: 1px dashed #4b526d; padding: 8px 16px; font-size: 13px; border-radius: 20px; cursor: pointer; }
        .extra-text { font-size: 18px; color: #10b981; font-weight: 500; text-align: center; }

        .control-panel { margin-top: 24px; width: 100%; }
        .reveal-btn {
            width: 100%; background: #1e2235; color: var(--accent); border: 1px solid var(--accent);
            padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .anki-controls { display: flex; gap: 12px; width: 100%; }
        .anki-btn {
            flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
            cursor: pointer; color: white; transition: opacity 0.2s;
        }
        .anki-btn.hard { background: var(--hard-btn); }
        .anki-btn.easy { background: var(--easy-btn); }
        
        .progress { text-align: center; font-size: 14px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px;}
        .pool-indicator { text-align: center; font-size: 12px; color: #6366f1; font-weight: 600; margin-bottom: 12px; }
        .status-badge { font-size: 12px; background: #2a3047; padding: 4px 10px; border-radius: 12px; color: #a5b4fc; margin-bottom: 8px;}
        .reset-link { text-align: center; color: var(--text-muted); margin-top: 32px; font-size: 14px; cursor: pointer; text-decoration: underline; }
        .loading { text-align: center; font-size: 16px; color: var(--accent); margin-top: 20px; }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h2>Google Sheets Sync</h2>
    <p class="subtitle">Powered by the Rolling 10-Word Focus Pool</p>
    
    <div class="form-group">
        <label for="sheet-url">Google Apps Script Web App URL:</label>
        <input type="text" id="sheet-url" placeholder="https://script.google.com/macros/s/.../exec">
    </div>

    <div class="form-group">
        <label for="voice-lang">Front Card Audio Pronunciation:</label>
        <select id="voice-lang">
            <option value="es-ES">Spanish (Español)</option>
            <option value="fr-FR">French (Français)</option>
            <option value="de-DE">German (Deutsch)</option>
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="it-IT">Italian (Italiano)</option>
            <option value="ja-JP">Japanese (日本語)</option>
        </select>
    </div>
    
    <button class="primary-btn" id="load-btn" onclick="fetchFromSheet()">Connect & Load Active Words</button>
    <div id="loading-spinner" class="loading hidden">Syncing with Google Sheets...</div>
</div>

<div class="container hidden" id="card-screen">
    <div class="progress" id="progress-text">0 total words left</div>
    <div class="pool-indicator" id="pool-text">🔥 Active Focus Arena: 10 words</div>
    
    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="front">
                <span class="status-badge" id="card-status">Status: New</span>
                <div id="card-front">Front</div>
                <button class="audio-btn" onclick="speakText(event)">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>
            <div class="back">
                <div style="height:20px;"></div> 
                <div class="back-content" id="card-back">Back</div>
                <div class="extra-wrapper" id="extra-layer"></div>
            </div>
        </div>
    </div>
    
    <div class="control-panel">
        <button id="reveal-btn" class="reveal-btn" onclick="flipCard()">Show Answer</button>
        <div id="anki-controls" class="anki-controls hidden">
            <button class="anki-btn hard" onclick="handleMiss(event)">🔴 Missed It (Reset)</button>
            <button class="anki-btn easy" onclick="handleCorrect(event)">🟢 Got It (+1 Check)</button>
        </div>
    </div>
    <div class="reset-link" onclick="resetApp()">← Disconnect / Settings</div>
</div>

<div class="container hidden" id="completion-screen" style="text-align: center; margin-top: 40px;">
    <h1>🎉</h1>
    <h2>All Active Words Cleared!</h2>
    <p class="subtitle">Every word in your Google Sheet is currently marked as MASTERED.</p>
    <button class="primary-btn" onclick="resetApp()">Back to Menu</button>
</div>

<script>
    const POOL_SIZE = 10; // Locked strictly to a 10-word focus cycle
    let activePool = [];
    let waitingRoom = [];
    let scriptUrl = '';
    let chosenLanguage = 'es-ES';

    window.onload = function() {
        if (localStorage.getItem('fc_script_url')) {
            document.getElementById('sheet-url').value = localStorage.getItem('fc_script_url');
        }
        if (localStorage.getItem('fc_saved_lang')) {
            document.getElementById('voice-lang').value = localStorage.getItem('fc_saved_lang');
        }
    }

    async function fetchFromSheet() {
        scriptUrl = document.getElementById('sheet-url').value.trim();
        chosenLanguage = document.getElementById('voice-lang').value;
        
        if (!scriptUrl) return alert('Please paste your Google Apps Script URL!');
        
        localStorage.setItem('fc_script_url', scriptUrl);
        localStorage.setItem('fc_saved_lang', chosenLanguage);

        document.getElementById('load-btn').classList.add('hidden');
        document.getElementById('loading-spinner').classList.remove('hidden');

        try {
            const response = await fetch(scriptUrl, { redirect: 'follow' });
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();

            // Strictly filter out MASTERED words
            let unmastered = data.filter(item => item.status !== 'MASTERED');

            if (unmastered.length === 0) {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('completion-screen').classList.remove('hidden');
            } else {
                // Shuffle all unmastered words randomly
                unmastered.sort(() => Math.random() - 0.5);
                
                // Slice the first 10 words into the Active Pool, rest go to Waiting Room
                activePool = unmastered.splice(0, POOL_SIZE);
                waitingRoom = unmastered;

                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('card-screen').classList.remove('hidden');
                renderCard();
            }
        } catch (err) {
            console.error('Fetch error:', err);
            alert('Failed to connect to Google Sheet.\n\nMake sure your Apps Script Deployment permission is set to "Who has access: Anyone".');
        } finally {
            document.getElementById('load-btn').classList.remove('hidden');
            document.getElementById('loading-spinner').classList.add('hidden');
        }
    }

    function renderCard() {
        const cardElement = document.getElementById('flashcard');
        cardElement.style.transition = 'none';
        cardElement.classList.remove('flipped');
        void cardElement.offsetWidth;
        cardElement.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';

        const current = activePool[0];
        document.getElementById('card-front').innerText = current.front;
        document.getElementById('card-back').innerText = current.back;
        document.getElementById('card-status').innerText = current.status ? `Status: ${current.status}` : 'Status: New';
        
        const totalLeft = activePool.length + waitingRoom.length;
        document.getElementById('progress-text').innerText = `${totalLeft} unmastered words remaining in sheet`;
        document.getElementById('pool-text').innerText = `🔥 Active Focus Arena: ${activePool.length} words`;
        
        setupExtraLayer();
        
        document.getElementById('reveal-btn').classList.remove('hidden');
        document.getElementById('anki-controls').classList.add('hidden');
    }

    function setupExtraLayer() {
        const layer = document.getElementById('extra-layer');
        if (!activePool[0].extra || activePool[0].extra === '') {
            layer.innerHTML = '';
            return;
        }
        layer.innerHTML = `<button class="extra-btn" onclick="revealExtra(event)">Reveal Backup Context</button>`;
    }

    function revealExtra(event) {
        event.stopPropagation();
        document.getElementById('extra-layer').innerHTML = `<div class="extra-text">${activePool[0].extra}</div>`;
    }

    async function handleCorrect(event) {
        event.stopPropagation();
        let currentCard = activePool.shift(); // Remove from active arena
        
        let newStatus = '✓';
        if (currentCard.status === '✓') newStatus = '✓✓';
        else if (currentCard.status === '✓✓') newStatus = 'MASTERED';

        sendUpdateToSheet(currentCard.rowIndex, newStatus);

        // If not yet MASTERED, send it to the back of the Waiting Room line!
        if (newStatus !== 'MASTERED') {
            currentCard.status = newStatus;
            waitingRoom.push(currentCard);
        }

        // Guaranteed Refill Loop: Keeps arena topped up at 10 words as long as waiting room has words
        while (activePool.length < POOL_SIZE && waitingRoom.length > 0) {
            activePool.push(waitingRoom.shift());
        }

        checkQueueOrNext();
    }

    async function handleMiss(event) {
        event.stopPropagation();
        let currentCard = activePool.shift();
        
        let newStatus = '';
        sendUpdateToSheet(currentCard.rowIndex, newStatus);

        currentCard.status = newStatus;
        
        // TRAPPED: Push it back into the 10-word pool so you face it again soon!
        activePool.push(currentCard);

        checkQueueOrNext();
    }

    function sendUpdateToSheet(rowIndex, newStatus) {
        const updateUrl = `${scriptUrl}?action=update&row=${rowIndex}&status=${encodeURIComponent(newStatus)}`;
        fetch(updateUrl, { mode: 'no-cors' }).catch(err => console.error("Sheet update failed", err));
    }

    function checkQueueOrNext() {
        if (activePool.length === 0 && waitingRoom.length === 0) {
            document.getElementById('card-screen').classList.add('hidden');
            document.getElementById('completion-screen').classList.remove('hidden');
        } else {
            renderCard();
        }
    }

    function speakText(event) {
        event.stopPropagation(); 
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(activePool[0].front);
            utterance.lang = chosenLanguage;
            
            const voices = window.speechSynthesis.getVoices();
            const matchingVoice = voices.find(v => v.lang.startsWith(chosenLanguage.split('-')[0]));
            if (matchingVoice) utterance.voice = matchingVoice;
            
            window.speechSynthesis.speak(utterance);
        }
    }

    function flipCard() {
        const cardElement = document.getElementById('flashcard');
        if (!cardElement.classList.contains('flipped')) {
            cardElement.classList.add('flipped');
            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('anki-controls').classList.remove('hidden');
        }
    }

    function resetApp() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('completion-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
