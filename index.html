<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Voice Flashcards</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #1e2235;
            --card-back-bg: #131722;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --extra-btn: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }
        h2 { text-align: center; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.025em;}
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 0; margin-bottom: 24px;}
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        
        select {
            background: #111524;
            color: var(--text-main);
            border: 1px solid #2e344e;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }
        
        textarea {
            width: 100%;
            height: 200px;
            background: #111524;
            color: var(--text-main);
            border: 1px solid #2e344e;
            border-radius: 14px;
            padding: 16px;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus, select:focus { border-color: var(--accent); }
        
        button.primary-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            font-size: 16px;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .hidden { display: none !important; }
        
        /* Flashcard Layout */
        .card-container {
            perspective: 1000px;
            width: 100%;
            height: 340px;
            margin-top: 10px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            box-sizing: border-box;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid #2d3149;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .front { font-size: 28px; font-weight: 700; text-align: center; }
        .back {
            transform: rotateY(180deg);
            background: var(--card-back-bg);
        }
        .back-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            width: 100%;
        }
        
        /* TTS Audio Button */
        .audio-btn {
            background: rgba(255, 255, 255, 0.07);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .audio-btn:active { background: var(--accent); }
        .audio-btn svg { width: 22px; height: 22px; fill: var(--text-main); }

        /* 3rd Column Layer */
        .extra-wrapper {
            width: 100%;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .extra-btn {
            background: #22253a;
            color: var(--text-muted);
            border: 1px dashed #4b526d;
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
        }
        .extra-text {
            font-size: 18px;
            color: var(--extra-btn);
            font-weight: 500;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            gap: 12px;
        }
        .nav-btn {
            background: #1e2235;
            color: white;
            border: 1px solid #2d3149;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }
        .progress { font-size: 14px; color: var(--text-muted); font-weight: 500; min-width: 60px; text-align: center;}
        .reset-link {
            text-align: center;
            color: var(--text-muted);
            margin-top: 32px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h2>Flashcard Generator</h2>
    <p class="subtitle">Supports audio + up to 3 context columns</p>
    
    <div class="form-group">
        <label for="voice-lang">Front Card Audio Pronunciation Language:</label>
        <select id="voice-lang">
            <option value="fr-FR">French (Français)</option>
            <option value="es-ES">Spanish (Español)</option>
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="it-IT">Italian (Italiano)</option>
            <option value="de-DE">German (Deutsch)</option>
            <option value="ja-JP">Japanese (日本語)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="data-input">Paste Word List:</label>
        <textarea id="data-input" placeholder="Example (3 Columns):&#10;French Word [Tab] Spanish Meaning [Tab] English Backup"></textarea>
    </div>
    
    <button class="primary-btn" onclick="generateCards()">Generate Deck</button>
</div>

<div class="container hidden" id="card-screen">
    <div class="card-container" onclick="flipCard()">
        <div class="card" id="flashcard">
            <!-- FRONT SIDE -->
            <div class="front">
                <div style="height:50px;"></div> <!-- Top spacer -->
                <div id="card-front">Front</div>
                <button class="audio-btn" onclick="speakText(event)">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>
            <!-- BACK SIDE -->
            <div class="back">
                <div style="height:20px;"></div> 
                <div class="back-content" id="card-back">Back</div>
                <div class="extra-wrapper" id="extra-layer"></div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button class="nav-btn" onclick="prevCard(event)">Prev</button>
        <span class="progress" id="progress-text">1 / 1</span>
        <button class="nav-btn" onclick="nextCard(event)">Next</button>
    </div>
    <div class="reset-link" onclick="resetApp()">← Edit word list</div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let chosenLanguage = 'fr-FR';

    window.onload = function() {
        const savedData = localStorage.getItem('fc_saved_words');
        const savedLang = localStorage.getItem('fc_saved_lang');
        if (savedData) document.getElementById('data-input').value = savedData;
        if (savedLang) document.getElementById('voice-lang').value = savedLang;
    }

    function generateCards() {
        const input = document.getElementById('data-input').value.trim();
        chosenLanguage = document.getElementById('voice-lang').value;
        if (!input) return alert('Please paste your list first!');

        localStorage.setItem('fc_saved_words', input);
        localStorage.setItem('fc_saved_lang', chosenLanguage);

        cards = [];
        const lines = input.split('\n');
        
        lines.forEach(line => {
            if (!line.trim()) return;
            let parts = line.split('\t');
            if (parts.length < 2) parts = line.split(',');
            
            if (parts.length >= 2) {
                cards.push({
                    front: parts[0].trim(),
                    back: parts[1].trim(),
                    extra: parts[2] ? parts[2].trim() : null
                });
            }
        });

        if (cards.length === 0) return alert('Could not parse text.');

        currentIndex = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('card-screen').classList.remove('hidden');
        renderCard();
    }

    function renderCard() {
        if (cards.length === 0) return;
        document.getElementById('flashcard').classList.remove('flipped'); 

        document.getElementById('card-front').innerText = cards[currentIndex].front;
        document.getElementById('card-back').innerText = cards[currentIndex].back;
        document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${cards.length}`;
        
        setupExtraLayer();
    }

    function setupExtraLayer() {
        const layer = document.getElementById('extra-layer');
        if (!cards[currentIndex].extra) {
            layer.innerHTML = '';
            return;
        }
        layer.innerHTML = `<button class="extra-btn" onclick="revealExtra(event)">Reveal Backup Context</button>`;
    }

    function revealExtra(event) {
        event.stopPropagation();
        document.getElementById('extra-layer').innerHTML = `<div class="extra-text">${cards[currentIndex].extra}</div>`;
    }

    // THE NATIVE TTS ENGINE FUNCTION
    function speakText(event) {
        event.stopPropagation(); // Stop the card from flipping when pressing the audio button
        
        if ('speechSynthesis' in window) {
            // Cancel any speech currently playing so it doesn't overlap
            window.speechSynthesis.cancel();
            
            const textToSpeak = cards[currentIndex].front;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = chosenLanguage;
            
            // Auto-locate a high-quality system voice matching the language code if available
            const voices = window.speechSynthesis.getVoices();
            const matchingVoice = voices.find(v => v.lang.startsWith(chosenLanguage.split('-')[0]));
            if (matchingVoice) utterance.voice = matchingVoice;
            
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Text-to-speech isn't supported on this browser version.");
        }
    }

    function flipCard() {
        document.getElementById('flashcard').classList.toggle('flipped');
    }

    function nextCard(event) {
        event.stopPropagation();
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            renderCard();
        }
    }

    function prevCard(event) {
        event.stopPropagation();
        if (currentIndex > 0) {
            currentIndex--;
            renderCard();
        }
    }

    function resetApp() {
        document.getElementById('card-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
